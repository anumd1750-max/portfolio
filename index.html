<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J. Style Premium Store</title>
    <!-- Ye line CSS ko connect karti hai -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">FABRIC & CO.</div>
        <ul class="nav-links">
            <li>New Arrivals</li>
            <li>Collections</li>
            <li>Sale</li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1>SUMMER COLLECTION 2026</h1>
            <p>Experience Elegance Like Never Before</p>
            <button class="shop-btn">Shop Now</button>
        </div>
    </header>

    <!-- Product Grid -->
    <section class="products">
        <!-- Category Menu (J. Style) -->
<div class="category-menu">
    <ul>
        <li>Essentials</li>
        <li>Co-Ord Set</li>
        <li>Shirt & Dupatta</li>
        <li>3 Piece</li>
        <li>Kurta</li>
        <li><strong>View All</strong></li>
    </ul>
    <div class="filter-sort">FILTER AND SORT</div>
</div>

<!-- Professional Product Grid -->
<section class="products-grid">
    <!-- Product 1 -->
    <div class="product-card">
        <div class="badge">-20%</div>
        <div class="img-container">
            <img src="Images Folder/product1.jpg" alt="Product">
            <div class="overlay-buttons">
                <button class="action-btn">Add to Cart</button>
                <button class="action-btn">Quick View</button>
            </div>
        </div>
        <div class="product-info">
            <h4>BLACK LAWN PRINTED CO-ORD SET</h4>
            <p class="price"><span class="old-price">PKR 5,000</span> PKR 4,000</p>
        </div>
    </div>

    <!-- Ab isi tarah 3 aur cards copy-paste karen taake 4 poore ho jayen -->
</section>

</body>
</html>
